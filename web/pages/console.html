<link rel="stylesheet" href="/pages/console.css"/>

<div class="console-container animate__animated animate__fadeIn animate__fast">
    <!-- Header -->
    <div class="page-header">
        <div class="title-group">
            <span class="material-symbols-rounded page-icon">terminal</span>
            <h2>{{sections.console}}</h2>
        </div>
        <div class="actions-group">
            <div class="search-box">
                <span class="material-symbols-rounded">search</span>
                <input type="text" id="console-search" placeholder="{{gameConsole.searchLog}}"/>
            </div>
            <button class="dark-btn" onclick="$('#console-text').empty()">
                <span class="material-symbols-rounded">delete_sweep</span>
                <span>{{gameConsole.clearConsole}}</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="console-layout">
        <div class="console-main card-panel">
            <div class="console-body" id="console-text"></div>
            <div class="console-input-group">
                <input type="text" id="cmd-input" placeholder="{{gameConsole.inputCommand}}"/>
                <button class="primary-btn icon-only" onclick="KubekServers.sendCommandFromInput(selectedServer)">
                    <span class="material-symbols-rounded">send</span>
                </button>
            </div>
        </div>

        <div class="console-sidebar">
            <!-- CPU Usage -->
            <div class="usage-card card-panel">
                <div class="usage-header">
                    <span class="material-symbols-rounded">memory</span>
                    <h4>CPU</h4>
                </div>
                <div class="usage-content">
                    <div class="lds-spinner" id="cpu-usage-spinner"><div></div><div></div><div></div></div>
                    <div id="cpu-usage-bar"></div>
                </div>
            </div>

            <!-- RAM Usage -->
            <div class="usage-card card-panel">
                <div class="usage-header">
                    <span class="material-symbols-rounded">monitoring</span>
                    <h4>RAM</h4>
                </div>
                <div class="usage-content">
                    <div class="lds-spinner" id="ram-usage-spinner"><div></div><div></div><div></div></div>
                    <div id="ram-usage-bar"></div>
                    <div class="usage-stats" id="ram-usage-text">{{commons.loading}}</div>
                </div>
            </div>
        </div>
    </div>
</div>
