<link rel="stylesheet" href="/pages/dashboard.css"/>

<div class="dashboard-container animate__animated animate__fadeIn animate__faster">
    <div class="dashboard-header">
        <h1>{{sections.dashboard}}</h1>
        <div class="system-quick-stats">
            <div class="stat-item">
                <span class="label">CPU</span>
                <div class="progress-mini"><div id="total-cpu-bar" style="width: 0%"></div></div>
                <span class="value" id="total-cpu-val">0%</span>
            </div>
            <div class="stat-item">
                <span class="label">RAM</span>
                <div class="progress-mini"><div id="total-ram-bar" style="width: 0%"></div></div>
                <span class="value" id="total-ram-val">0%</span>
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="dashboard-card status-card">
            <div class="card-header">
                <h3>{{sections.systemMonitor}}</h3>
                <span class="status-indicator online"></span>
            </div>
            <div class="system-stats-grid">
                <div class="system-stat">
                    <div class="stat-label">CPU</div>
                    <div class="stat-progress-container">
                        <div class="stat-progress-bar" id="sys-cpu-bar" style="width: 0%"></div>
                    </div>
                    <div class="stat-value" id="sys-cpu-val">0%</div>
                </div>
                <div class="system-stat">
                    <div class="stat-label">RAM</div>
                    <div class="stat-progress-container">
                        <div class="stat-progress-bar" id="sys-ram-bar" style="width: 0%"></div>
                    </div>
                    <div class="stat-value" id="sys-ram-val">0%</div>
                </div>
                <div class="system-stat">
                    <div class="stat-label">Uptime</div>
                    <div class="stat-value" id="sys-uptime-val">0h 0m</div>
                </div>
            </div>
        </div>

        <div class="dashboard-card quick-actions">
            <h3>{{commons.actions}}</h3>
            <div class="actions-list">
                <button class="action-btn primary" onclick="window.location='/?act=newServer'">
                    <span class="material-symbols-rounded">add_circle</span>
                    {{commons.create}}
                </button>
                <button class="action-btn" onclick="KubekPageManager.gotoPage('kubekSettings')">
                    <span class="material-symbols-rounded">settings</span>
                    {{sections.kubekSettings}}
                </button>
                <button class="action-btn" onclick="KubekPageManager.gotoPage('systemMonitor')">
                    <span class="material-symbols-rounded">monitoring</span>
                    {{sections.systemMonitor}}
                </button>
            </div>
        </div>
    </div>

    <div class="servers-grid-header">
        <h2>{{commons.server}}s</h2>
        <div class="grid-stats">
            <span class="badge secondary"><span id="total-servers-count">0</span> {{commons.total}}</span>
            <span class="badge success"><span id="running-servers-count">0</span> {{serverStatus.running}}</span>
        </div>
    </div>

    <div class="servers-grid" id="dashboard-servers-grid">
        <!-- Servers will be loaded here -->
    </div>
</div>

<script src="/pages/dashboard.js"></script>
