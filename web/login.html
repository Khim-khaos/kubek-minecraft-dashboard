<!DOCTYPE html>

<head>
    <!-- Meta -->
    <meta charset="utf-8"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Kubek | {{commons.auth}}</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/animate.min.css"/>

    <link rel="stylesheet" href="css/globals.css"/>
    <link rel="stylesheet" href="css/theme.css"/>
    <link rel="stylesheet" href="css/mobile.css"/>
    <link rel="stylesheet" href="css/preloader.css"/>

    <link rel="stylesheet" href="assets/fonts/Gilroy/stylesheet.css"/>

    <!-- Elements styles -->
    <link rel="stylesheet" href="css/elements/elements.css"/>

    <script src="js/classes/KubekPredefined.js"></script>
    <script src="js/classes/KubekRequests.js"></script>
    <script src="js/classes/KubekAlerts.js"></script>

    <!-- Scripts -->
    <script src="js/jquery-3.7.0.min.js"></script>
</head>

<body>
<div class="main-layout">
    <div class="login-modal">
        <div class="left">
            <div class="logo">
                <img src="/assets/kubek_icon.png" style="height: 32px" alt="Kubek icon"/>
                <img src="/assets/kubek_logo_text.svg" style="height: 20px; margin-left: 12px" alt="Kubek"/>
            </div>
            <h1>{{commons.auth}}</h1>
            <input type="text" id="login-input" placeholder="{{commons.login}}">
            <input type="password" id="password-input" placeholder="{{commons.password}}">
            <div class="grow"></div>
            <button class="primary-btn" onclick="login()" id="login-btn">{{commons.goto}}</button>
        </div>
        <div class="right"></div>
    </div>
</div>

<div class="uiPool bottom left" id="alerts-pool"></div>
</body>

<script>
    console.log("[UI] Starting Kubek UI...");

    $(function () {
        $("input").on("input", () => {
            verifyInputs();
        });
    });

    // Произвести вход
    function login() {
        let login = $("#login-input").val();
        let password = $("#password-input").val();
        let button = $("#login-btn");
        
        // Показываем загрузку
        button.attr("disabled", true);
        button.html('<span class="loader"></span>');

        KubekRequests.post("/auth/login", (result) => {
            if (result.success === true) {
                window.location = "/";
            } else {
                button.removeAttr("disabled");
                button.html("{{commons.goto}}");
                KubekAlerts.addAlert(result.error, "warning", "", 6000);
            }
        }, {
            login: login,
            password: password
        });
    }

    // Проверить значения полей ввода
    function verifyInputs() {
        let loginInput = $("#login-input");
        let passwordInput = $("#password-input");
        let button = $("#login-btn");
        if (loginInput.val().match(KubekPredefined.LOGIN_REGEX) !== null) {
            loginInput.removeClass("error");
        } else {
            loginInput.addClass("error");
            return button.attr("disabled", true);
        }

        if (passwordInput.val().match(KubekPredefined.PASSWORD_REGEX) !== null) {
            passwordInput.removeClass("error");
        } else {
            passwordInput.addClass("error");
            return button.attr("disabled", true);
        }

        button.removeAttr("disabled");
    }
</script>

<style>
    body,
    html {
        padding: 0;
        margin: 0;
        overflow: hidden;
        background: var(--bg-dark);
        background-image: radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.05) 0%, transparent 40%),
                          radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.05) 0%, transparent 40%);
    }

    /* Main layout styling */
    .main-layout {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .main-layout .login-modal {
        width: 800px;
        height: 500px;
        background: var(--bg-dark-accent);
        border-radius: var(--radius-lg);
        display: flex;
        overflow: hidden;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--glass-border);
    }

    .main-layout .login-modal .left {
        width: 45%;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .main-layout .login-modal .left .logo {
        margin-bottom: 32px;
        display: flex;
        align-items: center;
    }

    .main-layout .login-modal .left h1 {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 24px;
        color: var(--text-main);
    }

    .main-layout .login-modal .left input {
        margin-bottom: 16px;
    }

    .main-layout .login-modal .right {
        width: 55%;
        background-image: url("/assets/sprinkle_bg.svg");
        background-color: var(--bg-primary-900);
        background-size: cover;
        background-position: center;
        background-blend-mode: overlay;
        position: relative;
    }

    .main-layout .login-modal .right::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.2) 0%, transparent 100%);
    }

    .main-layout .login-modal button {
        margin-top: 12px;
        width: 100%;
        height: 48px;
    }

    /* Loader inside button */
    .loader {
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media screen and (max-width: 850px) {
        .main-layout .login-modal {
            width: 90%;
            height: auto;
            flex-direction: column;
        }
        .main-layout .login-modal .left,
        .main-layout .login-modal .right {
            width: 100%;
        }
        .main-layout .login-modal .right {
            height: 150px;
            order: -1;
        }
    }
</style>
