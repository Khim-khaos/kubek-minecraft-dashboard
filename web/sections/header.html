<div class="header" id="main-header">
    <button class="dark-btn icon-only" id="menu-btn" onclick="KubekUI.toggleSidebar()"><span class="material-symbols-rounded">menu</span></button>
    <div class="logo">
        <img src="/assets/kubek_icon.png" style="height: 32px" alt="Main icon"/>
        <img src="/assets/kubek_logo_text.svg" style="height: 20px; margin-left: 12px" alt="Kubek" />
    </div>

    <div class="account">
        <div class="bg-circle">
            <span class="material-symbols-rounded">person</span>
        </div>
        <div class="login"></div>
    </div>
</div>

<script>
    $(function () {
        // Получаем статус авторизации
        KubekRequests.get("/auth/isEnabled", (isAuthEnabled) => {
            if (isAuthEnabled === false) {
                // Если выключена - скрываем item аккаунта
                $(".header .account").hide();
            } else {
                // Если включена - загружаем логин
                KubekRequests.get("/auth/login", (myLogin) => {
                    $(".header .account .login").text(myLogin);
                });
            }
        })

        $("#main-header .account").on("click", (e) => {
            // Выход из аккаунта
            openAccountDropdown(e);
        });
    });

    function openAccountDropdown(e){
        let accountDrpData = [{
            "icon": "logout",
            "text": "{{commons.logout}}",
            "data": "logout"
        }]
        KubekDropdowns.addDropdown(accountDrpData, e.clientX, e.clientY, 5, (clickResult) => {
            if(clickResult === "logout"){
                KubekRequests.get("/auth/logout", () => {
                   console.log("User logged out!");
                   window.location = "/login.html";
                });
            }
        });
    }
</script>

<style>
    #main-header {
        grid-area: header;
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border-bottom: 1px solid var(--glass-border);
        width: 100%;
        height: 72px;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;

        display: grid;
        grid-template-columns: 1fr max-content 1fr max-content 1fr;
        grid-template-rows: 1fr;
        gap: 0;
        grid-template-areas: ". logo . account .";
        justify-items: center;
    }

    #main-header .logo {
        grid-area: logo;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s ease;
    }

    #main-header .logo:hover {
        transform: scale(1.02);
    }

    #main-header .account {
        grid-area: account;
        display: flex;
        flex-direction: row;
        align-items: center;
        padding: 6px 16px;
        border-radius: var(--radius-full);
        cursor: pointer;
        background: var(--bg-dark-accent);
        border: 1px solid var(--glass-border);
        transition: all 0.2s ease;
    }

    #main-header .account:hover {
        background: var(--bg-dark-accent-light);
        border-color: var(--bg-primary-500);
        box-shadow: var(--shadow-sm);
    }

    #main-header .account .bg-circle {
        background: var(--bg-primary-600);
        border-radius: 50%;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 12px;
        box-shadow: 0 0 10px rgba(37, 99, 235, 0.3);
    }

    #main-header .account .bg-circle * {
        font-size: 20px;
        color: white;
    }

    #main-header .account .login {
        font-weight: 600;
        font-size: 14px;
        color: var(--text-main);
    }

    #main-header #menu-btn {
        display: none;
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 101;
    }

    @media screen and (max-width: 1100px) {
        #main-header {
            grid-template-columns: 1fr;
            grid-template-areas: "logo";
        }
        #main-header .account {
            display: none;
        }
        #main-header #menu-btn {
            display: flex;
        }
    }
</style>
